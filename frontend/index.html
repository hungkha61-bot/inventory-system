<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Inventory System</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input, select, button { margin: 4px; padding: 6px; }
    ul { list-style-type: none; padding-left: 0; }
    li { margin-bottom: 6px; }
    #registerSection { border: 1px solid #ccc; padding: 10px; margin-top: 10px; display: none; }
    #paginationControls { margin-top: 10px; }

    button {
      cursor: pointer;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 4px;
    }

    button:hover {
      background: #2980b9;
    }
  </style>
</head>
<body>

<h2>Login</h2>
<form id="loginForm">
  <input type="email" id="email" placeholder="Email" required />
  <input type="password" id="password" placeholder="Password" required />
  <button type="submit">Login</button>
</form>

<p id="loginInfo"></p>
<button id="logoutBtn" style="display:none;" type="button">Logout</button>

<hr />

<h2>Dashboard</h2>
<div id="dashboard">
  <p>Total Items: <strong id="totalItems">0</strong></p>
  <p>Total Quantity: <strong id="totalQty">0</strong></p>
  <p>Total Value: <strong id="totalValue">0</strong></p>
</div>

<hr />

<h2>Add / Edit Item</h2>

<input type="text" id="itemInput" placeholder="Item name" required />
<input type="number" id="itemPrice" placeholder="Price" required min="0" step="0.01" />
<input type="number" id="itemQty" placeholder="Quantity" required min="0" step="1" />

<!-- Upload -->
<label>Image:</label>
<input type="file" id="itemImage" accept="image/*" />

<button id="addBtn" type="button">Add</button>

<ul id="itemList"></ul>

<div id="paginationControls">
  <button id="prevPage" type="button">Prev</button>
  <span id="pageInfo"></span>
  <button id="nextPage" type="button">Next</button>
</div>

<hr />

<h2>Search / Filter</h2>
<input type="text" id="searchName" placeholder="Name" />
<input type="text" id="searchByUser" placeholder="Created by (email)" />
<input type="number" id="searchMinPrice" placeholder="Min Price" />
<input type="number" id="searchMaxPrice" placeholder="Max Price" />
<input type="number" id="searchMinQty" placeholder="Min Qty" />
<input type="number" id="searchMaxQty" placeholder="Max Qty" />
<button id="searchBtn" type="button">Search</button>
<button id="exportBtn" type="button">Export CSV</button>

<select id="sortBy">
  <option value="createdAt">Newest</option>
  <option value="price">Price</option>
  <option value="quantity">Quantity</option>
</select>

<select id="sortOrder">
  <option value="desc">Desc</option>
  <option value="asc">Asc</option>
</select>

<hr />

<h2>Register New User (Admin Only)</h2>
<div id="registerSection">
  <input type="text" id="regUsername" placeholder="Username" required />
  <input type="email" id="regEmail" placeholder="Email" required />
  <input type="password" id="regPassword" placeholder="Password" required />
  <select id="regRole">
    <option value="user">User</option>
    <option value="admin">Admin</option>
  </select>
  <button id="regBtn" type="button">Register User</button>
</div>

<script src="script.js"></script>
</body>
</html>
